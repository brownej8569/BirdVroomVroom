<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BirdFighting - Singleplayer</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="screen singleplayer-screen">
    <button
      type="button"
      class="pixel-btn pixel-btn--sm nav-back"
      onclick="goToPage('index.html')"
      aria-label="Back"
    >BACK</button>

    <main class="sp-stage" aria-label="Singleplayer controls">
      <section class="sp-topright" aria-label="Username and finch">
        <div class="sp-idbar-wrap" aria-label="Username">
          <img class="sp-idbar" src="/images/Singleplayer/ID%20Bar.png" alt="" aria-hidden="true">
          <input
            id="sp-username"
            class="sp-username-input"
            type="text"
            inputmode="text"
            autocomplete="off"
            spellcheck="false"
            maxlength="16"
            placeholder="USERNAME"
            aria-label="Username"
          >
        </div>

        <img class="sp-finch" src="/images/Singleplayer/1.png" alt="" aria-hidden="true">
      </section>

      <section class="sp-controls" aria-label="Movement controls">
        <div class="sp-controls-wrap" aria-hidden="true">
          <div class="sp-wasd" aria-label="WASD cluster">
            <button type="button" class="sp-keybtn sp-keybtn--w">W</button>
            <button type="button" class="sp-keybtn sp-keybtn--a">A</button>
            <button type="button" class="sp-keybtn sp-keybtn--s">S</button>
            <button type="button" class="sp-keybtn sp-keybtn--d">D</button>
          </div>

          <button type="button" class="sp-keybtn sp-keybtn--space">SPACEBAR</button>
        </div>
      </section>

      <section class="sp-panel" aria-label="Finch test panel">
        <div class="sp-panel-title">SINGLEPLAYER</div>
        <div class="sp-panel-body">
          <div class="sp-directions">
            WASD to move. SHIFT or SPACEBAR to boost.
          </div>
          <div id="sp-output" class="sp-output" aria-live="polite">Click “RUN FINCH TEST” to verify connection.</div>
          <div class="sp-actions">
            <button type="button" class="pixel-btn pixel-btn--danger pixel-btn--sm" onclick="runFinchTest()">RUN FINCH TEST</button>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
