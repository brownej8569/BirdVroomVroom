<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BirdFighting - Single Player</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" defer></script>
  <script src="script.js" defer></script>
</head>
<body>
  <div class="screen controls-screen" data-control-page="singleplayer">
    <div class="top-ui">
      <button type="button" class="ui-btn" disabled aria-disabled="true">SCOREBOARD</button>
      <button type="button" class="ui-btn pause-btn" onclick="pauseRobot()">STOP / PAUSE</button>
      <div class="username-wrap">
        <img src="/images/ID Bar.png" alt="Team name bar" class="username-bar">
        <span id="team-name" class="username-text">Skipper</span>
      </div>
    </div>

    <img src="/images/Finch.png" alt="Finch" class="finch controls-finch">

    <div class="controls-center">
      <img src="/images/WASD.png" alt="WASD Controls" class="wasd-image">
      <img src="/images/Spacebar.png" alt="Spacebar" class="spacebar-image">
    </div>

    <div class="output-panel">
      <p id="output">Use keyboard WASD to move, Space to boost. Finch test:</p>
      <button type="button" class="test-btn" onclick="runScript('first_finch_test')">Run Finch Test</button>
    </div>

    <button type="button" class="back-btn" onclick="goToPage('index.html')">Back</button>
  </div>
</body>
</html>
