<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BirdFighting - Home</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="screen" id="home">
    <main class="home-stage" aria-label="Main menu">
      <section class="home-cluster" aria-label="Menu cluster">
        <img
          class="home-finch"
          src="/images/First%20Page/Finchrobot.png"
          alt=""
          aria-hidden="true"
        >

        <div class="menu-stack" aria-label="Menu">
          <button
            type="button"
            class="pixel-btn"
            onclick="goToPage('singleplayer-controls.html')"
            aria-label="Singleplayer"
          >SINGLEPLAYER</button>

          <button
            type="button"
            class="pixel-btn"
            onclick="goToPage('multiplayer-join.html')"
            aria-label="Multiplayer"
          >MULTIPLAYER</button>
        </div>
      </section>
    </main>

    <button
      type="button"
      class="bluetooth-btn"
      aria-label="Bluetooth"
    >
      <img
        class="bluetooth-img"
        src="/images/First%20Page/Bluetooth.png"
        alt=""
        aria-hidden="true"
      >
    </button>
  </div>
</body>
</html>
