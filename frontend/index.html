<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BirdFighting - Home</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="screen home-screen">
    <img src="/images/Finch.png" alt="Finch" class="finch home-finch">

    <div class="menu-buttons">
      <img src="/images/Menu.jpg" alt="Menu" class="menu-image">

      <button
        class="hotspot singleplayer-hotspot"
        type="button"
        onclick="goToPage('singleplayer-controls.html')"
        aria-label="Single Player"
      ></button>

      <button
        class="hotspot multiplayer-hotspot"
        type="button"
        onclick="goToPage('multiplayer-join.html')"
        aria-label="Multiplayer"
      ></button>
    </div>

    <img src="/images/Bluetooth-1.png" alt="Bluetooth" class="bluetooth-icon">
    <button
      class="hotspot bluetooth-hotspot"
      type="button"
      onclick="openBluetoothConnector()"
      aria-label="Bluetooth"
    ></button>
  </div>
</body>
</html>
