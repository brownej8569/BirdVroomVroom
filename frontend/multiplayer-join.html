<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BirdFighting - Multiplayer</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="screen multiplayer-screen">
    <button
      type="button"
      class="pixel-btn pixel-btn--sm nav-back"
      onclick="goToPage('index.html')"
      aria-label="Back"
    >BACK</button>

    <main class="mp-stage" aria-label="Multiplayer">
      <section class="sp-topright" aria-label="Finch">
        <img class="sp-finch" src="/images/Singleplayer/1.png" alt="" aria-hidden="true">
      </section>

      <section class="mp-center" aria-label="Multiplayer menu">
        <div class="mp-actions" role="group" aria-label="Room actions">
          <button type="button" class="pixel-btn mp-btn" id="mp-create">CREATE ROOM</button>
          <button type="button" class="pixel-btn mp-btn" id="mp-join">JOIN ROOM</button>
        </div>

        <div class="mp-codebar" aria-label="Room code">
          <input
            id="mp-code"
            class="mp-code-input"
            type="text"
            inputmode="text"
            autocomplete="off"
            spellcheck="false"
            maxlength="6"
            placeholder="ROOM CODE"
            aria-label="Room code"
          >
        </div>

        <div id="mp-status" class="mp-status" aria-live="polite"></div>
      </section>
    </main>
  </div>
</body>
</html>
